<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Risultati LUI&LEI 2026</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 1em; }
    .container { max-width: 1200px; margin: auto; }
    h1 { text-align: center; margin-bottom: 1em; }
    .select-group { margin-bottom: 1em; }
    table { width: 100%; border-collapse: collapse; background: #fff; margin-bottom: 2em; }
    th, td { border: 1px solid #ccc; padding: 0.4em; text-align: center; }
    th { background: #eee; }
    input[type="text"] { width: 90px; text-align: center; }
    button { padding: 0.3em 0.6em; margin: 0.2em; cursor: pointer; }
    .action-buttons { display: flex; justify-content: center; gap: 0.5em; }
    #loginForm, #adminContent { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Admin Risultati – LUI&LEI 2026</h1>

    <!-- Login -->
    <div id="loginForm">
      <p><strong>Accesso riservato</strong></p>
      <input type="email" id="email" placeholder="Email admin" /><br /><br />
      <input type="password" id="password" placeholder="Password" /><br /><br />
      <button onclick="login()">Login</button>
      <p id="loginError" style="color:red;"></p>
    </div>

    <!-- Contenuto visibile dopo login -->
    <div id="adminContent">
      <button onclick="logout()">Logout</button>

    <div class="select-group">
      <label for="sezione">Seleziona sezione:</label>
      <select id="sezione" onchange="caricaContenuto()">
        <option value="programma" selected>Fase a Gironi</option>
        <option value="gironi">Gironi</option>
        <option value="finali">Fase Finale</option>
</select>
    </div>
    
    <div class="select-group">
      <label for="filtroTesto" id="labelFiltro">Filtro:</label>
      <input type="text" id="filtroTesto" oninput="caricaContenuto()" placeholder="Es. Squadra A1, A, 2026-04-04" />
    </div>
    
    <div id="tabellaPartite"></div>

      <div class="select-group">
        <button onclick="resetRisultati()">Reset Tutti i Risultati</button>
      </div>
    </div>
  </div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBdteto-20fg-Ybr4t5E9i5n6ADJLp1RCU",
    authDomain: "luielei-2026.firebaseapp.com",
    databaseURL: "https://luielei-2026-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "luielei-2026",
    storageBucket: "luielei-2026.appspot.com",
    messagingSenderId: "761026742166",
    appId: "1:761026742166:web:00f044e9e7cee4392a7fb7"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const auth = firebase.auth();
  let gironiNomi = {};

  function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)
      .then(() => {
        document.getElementById("loginForm").style.display = "none";
        document.getElementById("adminContent").style.display = "block";
        caricaContenuto();
      })
      .catch(() => {
        document.getElementById("loginError").innerText = "Credenziali non valide.";
      });
  }

  function logout() {
    auth.signOut().then(() => location.reload());
  }

  auth.onAuthStateChanged(user => {
    if (user) {
      document.getElementById("loginForm").style.display = "none";
      document.getElementById("adminContent").style.display = "block";
      caricaContenuto();
    } else {
      document.getElementById("loginForm").style.display = "block";
      document.getElementById("adminContent").style.display = "none";
    }
  });

function caricaGironiNomi() {
  return db.ref("gironi").once("value").then(snapshot => {
    gironiNomi = snapshot.val() || {};
  });
}

function risolviCodiceSquadra(codice) {
  const pulito = String(codice || "").trim();
  const match = pulito.match(/^([A-G])([1-5])$/);

  if (!match) return "";
  const girone = match[1];
  const posizione = match[2];

  return gironiNomi?.[girone]?.[posizione]?.nome || "";
}

function formattaSquadraAdmin(codice) {
  const pulito = String(codice || "").trim();
  const nome = risolviCodiceSquadra(pulito);

  if (!pulito) return "";
  if (!nome) return pulito;

  return `${pulito} — ${nome}`;
}

function caricaContenuto() {
  const sezione = document.getElementById("sezione").value;
  aggiornaUISezione(sezione);

  caricaGironiNomi().then(() => {
    if (sezione === "gironi") {
      db.ref("gironi").once("value", snapshot => {
        mostraTabellaGironi(snapshot.val() || {});
      });
      return;
    }

    db.ref(sezione).once("value", snapshot => {
      mostraTabellaPartite(snapshot.val() || {}, sezione);
    });
  });
}

  function aggiornaUISezione(sezione) {
    const label = document.getElementById("labelFiltro");
    const input = document.getElementById("filtroTesto");

    if (sezione === "gironi") {
      label.innerText = "Filtra gironi o squadre:";
      input.placeholder = "Es. A, A1, Squadra A1";
    } else if (sezione === "programma") {
      label.innerText = "Filtra partite:";
      input.placeholder = "Es. A1, A, 2026-04-04, Campo A";
    } else {
      label.innerText = "Filtra finali:";
      input.placeholder = "Es. Ottavi, G, 2026-04-06";
    }
  }

  function resetRisultati() {
    const sezione = document.getElementById("sezione").value;

    if (sezione === "gironi") {
      alert("Nei gironi non ci sono risultati da resettare.");
      return;
    }

    if (!confirm(`Sicuro di voler svuotare tutti i risultati della sezione "${sezione}"?`)) return;

    db.ref(sezione).once("value", snapshot => {
      const dati = snapshot.val() || {};
      const updates = {};

      Object.keys(dati).forEach(id => {
        updates[`${id}/RISULTATO`] = "";
      });

      db.ref(sezione).update(updates)
        .then(() => {
          alert("Tutti i risultati svuotati.");
          caricaContenuto();
        });
    });
  }

  function salvaRisultato(sezione, id) {
    const risultato = document.getElementById(`risultato-${sezione}-${id}`).value.trim();

    if (!/^\d+-\d+$/.test(risultato) && risultato !== "") {
      alert("Inserisci un risultato valido nel formato X-Y");
      return;
    }

    db.ref(`${sezione}/${id}/RISULTATO`).set(risultato)
      .then(() => caricaContenuto());
  }
  window.salvaRisultato = salvaRisultato;

  function svuotaRisultato(sezione, id) {
    if (!confirm("Vuoi davvero cancellare il risultato?")) return;

    db.ref(`${sezione}/${id}/RISULTATO`).set("")
      .then(() => caricaContenuto());
  }
  window.svuotaRisultato = svuotaRisultato;

  function salvaSquadra(girone, posizione) {
    const input = document.getElementById(`nome-${girone}-${posizione}`);
    const nome = input.value.trim();

    if (!nome) {
      alert("Inserisci un nome squadra.");
      input.focus();
      return;
    }

    db.ref(`gironi/${girone}/${posizione}/nome`).set(nome)
      .then(() => {
        input.style.backgroundColor = "#d4edda";
        setTimeout(() => input.style.backgroundColor = "", 700);
      });
  }
  window.salvaSquadra = salvaSquadra;

  function mostraTabellaGironi(gironi) {
    const filtro = document.getElementById("filtroTesto").value.toLowerCase().trim();
    const lettere = ["A", "B", "C", "D", "E", "F", "G"];

    let html = "";

    lettere.forEach(girone => {
      const squadre = gironi[girone] || {};
      const righe = [];

      for (let posizione = 1; posizione <= 5; posizione++) {
        const nome = squadre[posizione]?.nome || "";
        const codice = `${girone}${posizione}`;
        const testo = `${girone} ${codice} ${nome}`.toLowerCase();

        if (filtro && !testo.includes(filtro)) continue;

        righe.push(`
          <tr>
            <td>${codice}</td>
            <td>
              <input type="text" id="nome-${girone}-${posizione}" value="${escapeHtml(nome)}" style="width: 95%; text-align:left;" />
            </td>
            <td>
              <button onclick="salvaSquadra('${girone}', '${posizione}')">Salva</button>
            </td>
          </tr>
        `);
      }

      if (righe.length === 0) return;

      html += `
        <h2>Girone ${girone}</h2>
        <table>
          <thead>
            <tr>
              <th>Codice</th>
              <th>Nome squadra</th>
              <th>Azione</th>
            </tr>
          </thead>
          <tbody>
            ${righe.join("")}
          </tbody>
        </table>
      `;
    });

    if (!html) {
      html = `<p><em>Nessun risultato trovato per il filtro inserito.</em></p>`;
    }

    document.getElementById("tabellaPartite").innerHTML = html;
  }

function mostraTabellaPartite(partite, sezione) {
  const filtro = document.getElementById("filtroTesto").value.toLowerCase().trim();

  const entries = Object.entries(partite)
    .filter(([, p]) => {
      const squadra1Display = formattaSquadraAdmin(p.SQUADRA1 || "");
      const squadra2Display = formattaSquadraAdmin(p.SQUADRA2 || "");

      const testo = [
        p["FASE FINALE"] || "",
        p.DATA || "",
        p.ORA || "",
        p.CAMPO || "",
        p.GIRONE || "",
        p.TURNO || "",
        p.SQUADRA1 || "",
        p.SQUADRA2 || "",
        squadra1Display,
        squadra2Display,
        p.RISULTATO || ""
      ].join(" ").toLowerCase();

      return testo.includes(filtro);
    })
    .sort(([, a], [, b]) => {
      const dtA = new Date(`${a.DATA || ""}T${a.ORA || "00:00"}`);
      const dtB = new Date(`${b.DATA || ""}T${b.ORA || "00:00"}`);
      return dtA - dtB || String(a.CAMPO || "").localeCompare(String(b.CAMPO || ""));
    });

  let html = `<table><thead><tr>`;

  html += sezione === "programma"
    ? `<th>Data</th><th>Ora</th><th>Campo</th><th>Girone</th><th>Squadra 1</th><th>Risultato</th><th>Squadra 2</th><th>Azioni</th>`
    : `<th>Fase</th><th>Data</th><th>Ora</th><th>Campo</th><th>Turno</th><th>Squadra 1</th><th>Risultato</th><th>Squadra 2</th><th>Azioni</th>`;

  html += `</tr></thead><tbody>`;

  for (const [id, p] of entries) {
    const squadra1 = formattaSquadraAdmin(p.SQUADRA1 || "");
    const squadra2 = formattaSquadraAdmin(p.SQUADRA2 || "");

    html += `<tr>`;

    if (sezione === "programma") {
      html += `
        <td>${escapeHtml(p.DATA || "")}</td>
        <td>${escapeHtml(p.ORA || "")}</td>
        <td>${escapeHtml(p.CAMPO || "")}</td>
        <td>${escapeHtml(p.GIRONE || "")}</td>
        <td>${escapeHtml(squadra1)}</td>
      `;
    } else {
      html += `
        <td>${escapeHtml(p["FASE FINALE"] || "")}</td>
        <td>${escapeHtml(p.DATA || "")}</td>
        <td>${escapeHtml(p.ORA || "")}</td>
        <td>${escapeHtml(p.CAMPO || "")}</td>
        <td>${escapeHtml(p.TURNO || "")}</td>
        <td>${escapeHtml(squadra1)}</td>
      `;
    }

    html += `
      <td><input type="text" id="risultato-${sezione}-${id}" value="${escapeHtml(p.RISULTATO || "")}" /></td>
      <td>${escapeHtml(squadra2)}</td>
      <td class="action-buttons">
        <button onclick="salvaRisultato('${sezione}', '${id}')">Salva</button>
        <button onclick="svuotaRisultato('${sezione}', '${id}')">Svuota</button>
      </td>
    `;

    html += `</tr>`;
  }

  html += `</tbody></table>`;

  if (entries.length === 0) {
    html = `<p><em>Nessun risultato trovato per il filtro inserito.</em></p>`;
  }

  document.getElementById("tabellaPartite").innerHTML = html;
}

  function escapeHtml(value) {
    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }
</script>
</body>
</html>
